# ─────────────────────────────────────────────────────────────
# HUBB CI Pipeline
# Runs on every push and pull request to main/develop.
#
# Jobs:
#   lint     — ruff + mypy type-check
#   test     — pytest with coverage enforcement
#   sast     — bandit security scan
#   docker   — build image, run smoke test, push to GHCR on main
# ─────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/hubb-api

jobs:
  # ── Lint ────────────────────────────────────────────────────
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dev dependencies
        run: pip install ruff mypy pydantic-settings structlog flask requests

      - name: Ruff lint
        run: ruff check src/ --output-format=github

      - name: Ruff format check
        run: ruff format src/ --check

      - name: mypy type-check
        run: mypy src/ --ignore-missing-imports --no-error-summary

  # ── Test ────────────────────────────────────────────────────
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install \
            flask pydantic-settings structlog python-dotenv requests \
            sqlalchemy alembic redis prometheus-client \
            opentelemetry-sdk opentelemetry-instrumentation-flask \
            opentelemetry-exporter-otlp-proto-grpc \
            pytest pytest-cov

      - name: Run tests
        env:
          NEWS_API_KEY: ci-test-key
          SECRET_KEY: ci-test-secret
          ENVIRONMENT: development
          USE_REDIS: "false"
        run: |
          python -m pytest tests/ \
            --no-header \
            --tb=short \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=50 \
            -q

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ── SAST ────────────────────────────────────────────────────
  sast:
    name: Security Scan (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit
        run: |
          bandit -r src/ \
            -x src/workers/tasks/summarize_task.py \
            --severity-level medium \
            --confidence-level medium \
            -f json \
            -o bandit-report.json || true
          bandit -r src/ \
            -x src/workers/tasks/summarize_task.py \
            --severity-level medium \
            --confidence-level medium

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  # ── Docker Build + Smoke Test ────────────────────────────────
  docker:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest
    needs: [lint, test, sast]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployment/docker/Dockerfile.api
          push: false
          load: true
          tags: hubb-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — health endpoint
        run: |
          docker run -d \
            --name hubb-smoke \
            -p 8000:8000 \
            -e NEWS_API_KEY=smoke-test-key \
            -e SECRET_KEY=smoke-test-secret \
            -e ENVIRONMENT=development \
            -e USE_REDIS=false \
            hubb-api:ci
          # Wait up to 30 s for the app to start
          for i in $(seq 1 15); do
            sleep 2
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              break
            fi
            echo "Attempt $i — status $STATUS"
          done
          [ "$STATUS" = "200" ] || { docker logs hubb-smoke; exit 1; }
          docker stop hubb-smoke

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployment/docker/Dockerfile.api
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
